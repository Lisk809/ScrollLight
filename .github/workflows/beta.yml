name: 🧪 Beta Build (测试版)

on:
  push:
    branches: [ develop, feature/**, hotfix/** ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: beta-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Unit Tests ──────────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission
        run: chmod +x gradlew
        
      - name: Download gradle-wrapper.jar
        run: |
            mkdir -p gradle/wrapper
            curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
            gradle-version: wrapper   # ← 读 gradle-wrapper.properties 里的版本，无需手写版本号
      - name: Run lint
        run: gradlew lint --stacktrace

      - name: Run unit tests
        run: gradlew testDebugUnitTest --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/

  # ─── Build Debug APK ───────────────────────────────────────────────────────
  build-beta:
    name: Build Beta APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: gradlew assembleDebug --stacktrace

      - name: Rename APK with commit SHA
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/ScrollLight-beta-${SHA}.apk

      - name: Upload Beta APK
        uses: actions/upload-artifact@v4
        with:
          name: ScrollLight-Beta-APK
          path: app/build/outputs/apk/debug/ScrollLight-beta-*.apk
          retention-days: 14

  # ─── Instrumented Tests (optional, needs emulator) ────────────────────────
  instrumented-test:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/connected/

  # ─── Comment PR with APK download link ───────────────────────────────────
  comment-pr:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: build-beta
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🧪 Beta APK 已构建\n\n' +
                    '📦 [下载测试版 APK](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) (保留14天)\n\n' +
                    '| 项目 | 值 |\n|---|---|\n' +
                    '| Commit | `${{ github.sha }}` |\n' +
                    '| 分支 | `${{ github.head_ref }}` |\n' +
                    '| 构建时间 | ${{ github.event.pull_request.updated_at }} |'
            })
