name: 🧪 Beta Build (测试版)

on:
  push:
    branches: [ develop, feature/**, hotfix/** ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: beta-${{ github.ref }}
  cancel-in-progress: true

# ── 公共步骤（YAML anchor，减少重复） ─────────────────────────────────────────
# GitHub Actions 不支持 anchor，用 composite action 替代；
# 这里直接展开，保持可读性。

jobs:
  # ─── Lint & Unit Tests ─────────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        run: ./gradlew lint --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/

  # ─── Build Debug APK ──────────────────────────────────────────────────────
  build-beta:
    name: Build Beta APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK with commit SHA
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/ScrollLight-beta-${SHA}.apk

      - name: Upload Beta APK
        uses: actions/upload-artifact@v4
        with:
          name: ScrollLight-Beta-APK
          path: app/build/outputs/apk/debug/ScrollLight-beta-*.apk
          retention-days: 14

  # ─── Comment on PR ─────────────────────────────────────────────────────────
  comment-pr:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: build-beta
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🧪 Beta APK 已构建\n\n' +
                    '📦 [下载测试版 APK](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) (保留14天)\n\n' +
                    '| 项目 | 值 |\n|---|---|\n' +
                    '| Commit | `${{ github.sha }}` |\n' +
                    '| 分支 | `${{ github.head_ref }}` |'
            })
