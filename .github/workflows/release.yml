name: 🚀 Release Build (稳定版)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.3)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'Release notes'
        required: false
        default: '修复已知问题，优化性能。'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Full test suite ────────────────────────────────────────────────────────
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace

  # ─── Build signed release APK + AAB ────────────────────────────────────────
  build-release:
    name: Build & Sign Release
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="${{ inputs.version_name }}"
          fi
          CODE=$(echo $VER | awk -F. '{ printf "%d%02d%02d", $1, $2, $3 }')
          echo "version_name=$VER" >> $GITHUB_OUTPUT
          echo "version_code=$CODE" >> $GITHUB_OUTPUT

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH:     ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.versionName=${{ steps.version.outputs.version_name }} \
            -Pandroid.versionCode=${{ steps.version.outputs.version_code }} \
            --stacktrace

      - name: Build release AAB
        env:
          KEYSTORE_PATH:     ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.versionName=${{ steps.version.outputs.version_name }} \
            -Pandroid.versionCode=${{ steps.version.outputs.version_code }} \
            --stacktrace

      - name: Rename artifacts
        run: |
          VER=${{ steps.version.outputs.version_name }}
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/ScrollLight-v${VER}.apk
          cp app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/ScrollLight-v${VER}.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScrollLight-Release-APK
          path: app/build/outputs/apk/release/ScrollLight-*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ScrollLight-Release-AAB
          path: app/build/outputs/bundle/release/ScrollLight-*.aab

  # ─── Create GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ScrollLight-Release-APK
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: ScrollLight-Release-AAB
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-release.outputs.version_name }}
          name: 光言圣经 v${{ needs.build-release.outputs.version_name }}
          body: |
            ## 🕊️ 光言圣经 v${{ needs.build-release.outputs.version_name }}

            ${{ inputs.release_notes || '查看 Commits 了解本次更新内容。' }}

            ---
            | 文件 | 说明 |
            |---|---|
            | `ScrollLight-v*.apk` | 直接安装（需开启未知来源） |
            | `ScrollLight-v*.aab` | Google Play 上架包 |

            > 最低要求：Android 8.0 (API 26)
          files: dist/*
          draft: false
          prerelease: false
